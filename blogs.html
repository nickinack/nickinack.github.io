<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogs — Karthik Viswanathan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" />
  </noscript>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    body > .section { flex: 1; }

    .blogs-hero {
      padding: max(9rem, 14vh) 7% 4rem;
      position: relative;
      z-index: 1;
    }
    .blogs-hero h1 {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 3vw, 2.5rem);
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }
    .blogs-hero .sub {
      font-family: var(--sans);
      font-size: 0.5rem;
      color: var(--muted);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--sans);
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--ink); }

    .blog-list { display: flex; flex-direction: column; }
    .blog-entry {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 2rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .blog-entry:first-child { border-top: 1px solid var(--rule); }
    .blog-entry:hover { opacity: 0.65; }
    .blog-entry-title {
      font-family: var(--serif);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink);
    }
    .blog-entry-ext {
      font-family: var(--sans);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      white-space: nowrap;
    }
    .blog-empty {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-style: italic;
      color: var(--muted);
      padding: 2rem 0;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div id="scroll-progress-bar"></div>

  <nav id="navbar">
    <a href="index.html" class="nav-logo" aria-label="home">
      <svg width="42" height="26" viewBox="-28 -16 56 32" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0,2 Q-13,-10 -26,2"/>
        <path d="M0,2 Q13,-10 26,2"/>
        <circle cx="0" cy="2" r="2.4" fill="currentColor" stroke="none"/>
        <path d="M0,4 Q2,10 0,13 Q-2,10 0,4"/>
      </svg>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#about">about</a></li>
      <li><a href="index.html#publications">papers</a></li>
      <li><a href="blogs.html">blogs</a></li>
      <li><a href="index.html#contact">contact</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="blogs-hero">
    <div class="container">
      <a class="back-link" href="index.html">← back</a>
      <h1>Blogs</h1>
      <p class="sub">Writing on genomics, AI, and whatever else comes to mind.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="blog-list" id="blog-list">
        <p class="blog-empty">Loading...</p>
      </div>
    </div>
  </section>

  <footer id="footer">
    <p id="footer-line"><span>Karthik Viswanathan</span> · 2026</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      new AnimalCanvas();
      initScrollProgress();
      initNavbar();

      loadBlogList();
    });

    function fileNameToTitle(filename) {
      return filename
        .replace(/\.(md|txt)$/, '')
        .replace(/[-_]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    async function loadBlogList() {
      const list = document.getElementById('blog-list');
      try {
        const res = await fetch('blogs/index.json');
        const files = await res.json();

        list.innerHTML = '';

        if (files.length === 0) {
          list.innerHTML = '<p class="blog-empty">No posts yet — check back soon.</p>';
          return;
        }

        files.forEach(file => {
          const title = fileNameToTitle(file);
          const ext   = file.split('.').pop().toUpperCase();
          const a = document.createElement('a');
          a.className = 'blog-entry reveal-item';
          a.href = `blog.html?file=${encodeURIComponent(file)}`;
          a.innerHTML = `
            <span class="blog-entry-title">${title}</span>
            <span class="blog-entry-ext">${ext}</span>
          `;
          list.appendChild(a);
        });

        initScrollReveal();
      } catch (e) {
        list.innerHTML = '<p class="blog-empty">Could not load posts.</p>';
      }
    }
  </script>
</body>
</html>
