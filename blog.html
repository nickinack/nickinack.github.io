<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" />
  </noscript>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .post-wrap { flex: 1; }

    .post-header {
      padding: max(9rem, 14vh) 7% 3rem;
      position: relative;
      z-index: 1;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--sans);
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--ink); }
    .post-title {
      font-family: var(--serif);
      font-size: clamp(1.2rem, 2.75vw, 2.25rem);
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .post-body {
      max-width: 720px;
    }
    .post-body h1, .post-body h2, .post-body h3 {
      font-family: var(--serif);
      color: var(--ink);
      margin: 2.5rem 0 0.8rem;
      line-height: 1.2;
    }
    .post-body h1 { font-size: 1.1rem; font-weight: 600; }
    .post-body h2 { font-size: 0.9rem; font-weight: 600; }
    .post-body h3 { font-size: 0.7rem; font-weight: 600; }
    .post-body p {
      font-family: var(--serif);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.9;
      margin-bottom: 1.5rem;
    }
    .post-body strong { font-weight: 700; color: var(--ink); }
    .post-body em { font-style: italic; color: var(--muted); }
    .post-body hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }
    .post-body pre {
      font-family: monospace;
      font-size: 0.5rem;
      background: rgba(0,0,0,0.04);
      padding: 1.2rem 1.5rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .post-body code {
      font-family: monospace;
      font-size: 0.92em;
      background: rgba(0,0,0,0.06);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }
    .post-body pre code { background: none; padding: 0; }
    .post-body ul, .post-body ol {
      margin-left: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .post-body ul { list-style: disc; }
    .post-body ol { list-style: decimal; }
    .post-body li {
      font-family: var(--serif);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 0.3rem;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>

        <path d="M0,2 Q13,-10 26,2"/>
        <circle cx="0" cy="2" r="2.4" fill="currentColor" stroke="none"/>

    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#about">about</a></li>
      <li><a href="index.html#publications">papers</a></li>

      <li><a href="index.html#contact">contact</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="post-header">
    <div class="container">
      <a class="back-link" href="blogs.html">← all blogs</a>
      <h1 class="post-title" id="post-title"></h1>
    </div>
  </div>

  <div class="post-wrap section">
    <div class="container">
      <div class="post-body" id="post-body"></div>
    </div>
  </div>

  <footer id="footer">
    <p id="footer-line"><span>Karthik Viswanathan</span> · 2026</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      new AnimalCanvas();
      initScrollProgress();
      initNavbar();
      loadPost();
    });

    function fileNameToTitle(filename) {
      return filename
        .replace(/\.(md|txt)$/, '')
        .replace(/[-_]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    // Minimal markdown → HTML renderer
    function renderMarkdown(text) {
      const lines = text.split('\n');
      let html = '';
      let inPre = false;
      let preBuffer = '';
      let paraBuffer = [];

      function flushPara() {
        if (paraBuffer.length) {
          const content = paraBuffer.join(' ').trim();
          if (content) html += `<p>${inlineRender(content)}</p>`;
          paraBuffer = [];
        }
      }

      function inlineRender(s) {
        return s
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/_(.+?)_/g, '<em>$1</em>');
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code blocks
        if (line.startsWith('```')) {
          if (!inPre) {
            flushPara();
            inPre = true;
            preBuffer = '';
          } else {
            html += `<pre><code>${preBuffer.replace(/</g,'&lt;')}</code></pre>`;
            inPre = false;
          }
          continue;
        }
        if (inPre) { preBuffer += line + '\n'; continue; }

        // HR
        if (/^---+$/.test(line.trim())) { flushPara(); html += '<hr>'; continue; }

        // Headings
        const h3 = line.match(/^### (.+)/);
        const h2 = line.match(/^## (.+)/);
        const h1 = line.match(/^# (.+)/);
        if (h1) { flushPara(); html += `<h1>${inlineRender(h1[1])}</h1>`; continue; }
        if (h2) { flushPara(); html += `<h2>${inlineRender(h2[1])}</h2>`; continue; }
        if (h3) { flushPara(); html += `<h3>${inlineRender(h3[1])}</h3>`; continue; }

        // Lists
        const ul = line.match(/^[-*] (.+)/);
        const ol = line.match(/^\d+\. (.+)/);
        if (ul || ol) {
          flushPara();
          const tag = ol ? 'ol' : 'ul';
          const items = [line];
          while (i + 1 < lines.length && (lines[i+1].match(/^[-*] /) || lines[i+1].match(/^\d+\. /))) {
            items.push(lines[++i]);
          }
          html += `<${tag}>${items.map(it => {
            const m = it.match(/^[-*\d.]+\s(.+)/);
            return `<li>${inlineRender(m ? m[1] : it)}</li>`;
          }).join('')}</${tag}>`;
          continue;
        }

        // Blank line = paragraph break
        if (line.trim() === '') { flushPara(); continue; }

        // Regular text
        paraBuffer.push(line.trim());
      }
      flushPara();
      return html;
    }

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const file   = params.get('file');
      if (!file || !/\.(md|txt)$/.test(file)) {
        document.getElementById('post-title').textContent = 'Post not found';
        return;
      }

      // Set title from filename
      document.title = fileNameToTitle(file) + ' — Karthik Viswanathan';
      document.getElementById('post-title').textContent = fileNameToTitle(file);

      try {
        const res  = await fetch(`blogs/${encodeURIComponent(file)}`);
        if (!res.ok) throw new Error('Not found');
        const text = await res.text();
        const body = document.getElementById('post-body');

        if (file.endsWith('.md')) {
          body.innerHTML = renderMarkdown(text);
        } else {
          // Plain text: split by blank lines into paragraphs
          body.innerHTML = text.trim().split(/\n\n+/)
            .map(p => `<p>${p.replace(/\n/g, ' ').trim()}</p>`)
            .join('');
        }
      } catch (e) {
        document.getElementById('post-body').innerHTML =
          '<p>Could not load this post.</p>';
      }
    }
  </script>
</body>
</html>
